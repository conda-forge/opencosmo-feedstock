{% set name = "opencosmo" %}
{% set version = "1.2.4" %}
{% set build_number = 0 %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 331374628ee0ad328b5a4456ba03e0753941a411665a86f85d2b4e3d376f6e83

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - uv-build
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=2.0,<2.5
    - h5py >=3.12.1,<4.0.0
    - pydantic >=2.10.6,<3.0.0
    - healpy >=1.19.0,<2.0
    - hdf5plugin >=5.0.0,!=5.1.0
    - astropy-base >=7.2.0,<8.0.0
    - deprecated >=1.2.48,<2.0
    - click >=8.2.1,<9.0.0
    - numba >=0.64.0,<1.0
    - rustworkx >=0.17.1
    - healsparse >=1.11.1,<2.0
    - healpy >=1.18.1,<2.0.0



test:
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://github.com/ArgonneCPAC/OpenCosmo
  summary: 'The OpenCosmo Python Toolkit'
  description: |
    The OpenCosmo Python Toolkit provides utilities for reading, writing and manipulating data from cosmological simulations produced by the Cosmolgical Physics and Advanced Computing (CPAC) group at Argonne National Laboratory. The OpenCosmo toolkit integrates with standard tools such as AstroPy, and allows you to manipulate data in a fully-consistent cosmological context.

  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  doc_url: https://opencosmo.readthedocs.org/

extra:
  recipe-maintainers:
    - AstroPatty
