{% set name = "opencosmo" %}
{% set version = "1.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ArgonneCPAC/OpenCosmo/archive/refs/tags/{{ version }}.tar.gz
  sha256: 31fdab168956727e3aa6eddecddcaf00ebba845201986a739ee88b9cb43db604

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true # [win]

requirements:
  build:
    - {{ compiler('rust') }}
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ stdlib("c") }}
  host:
    - python
    - pip
    - maturin >=1.0,<2
  run:
    - python
    - numpy >=2.0,<2.5
    - h5py >=3.12.1,<4.0.0
    - pydantic >=2.10.6,<3.0.0
    - healpy >=1.19.0,<2.0
    - hdf5plugin >=5.0.0,!=5.1.0
    - astropy-base >=7.2.0,<8.0.0
    - deprecated >=1.2.48,<2.0
    - click >=8.2.1,<9.0.0
    - numba >=0.64.0,<1.0
    - rustworkx >=0.17.1
    - healsparse >=1.11.1,<2.0

test:
  imports:
    - opencosmo
    - opencosmo._lib
  requires:
    - python
    - pip
  commands:
    - pip check

about:
  home: https://github.com/ArgonneCPAC/OpenCosmo
  summary: 'The OpenCosmo Python Toolkit'
  description: |
    The OpenCosmo Python Toolkit provides utilities for reading, writing and manipulating data from cosmological simulations produced by the Cosmolgical Physics and Advanced Computing (CPAC) group at Argonne National Laboratory. The OpenCosmo toolkit integrates with standard tools such as AstroPy, and allows you to manipulate data in a fully-consistent cosmological context.

  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  doc_url: https://opencosmo.readthedocs.org/

extra:
  recipe-maintainers:
    - AstroPatty
